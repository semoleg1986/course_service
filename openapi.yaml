openapi: 3.1.0
info:
  title: course_service API
  version: 0.1.0
  description: |
    Контрактный API для контекста создания и доставки курсов.
    Соответствует границам Clean Architecture и DDD.
    Авторизация Bearer JWT: issuer=auth_service, audience=platform_clients, typ=access.
servers:
  - url: http://localhost:8000

tags:
  - name: health
  - name: internal
  - name: admin
  - name: teacher
  - name: student
  - name: parent
  - name: public

paths:
  /healthz:
    get:
      tags: [health]
      summary: Проверка состояния
      operationId: healthCheck
      responses:
        '200':
          description: Сервис доступен
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  /internal/v1/access/check:
    post:
      tags: [internal]
      summary: Проверить доступ актора к курсу (межсервисный контракт)
      operationId: internalCheckCourseAccess
      security:
        - serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseAccessCheckRequest'
      responses:
        '200':
          description: Решение по доступу к курсу
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseAccessDecisionResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/admin/courses:
    post:
      tags: [admin]
      summary: Создать курс (админ)
      operationId: adminCreateCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/admin/courses/{course_id}:
    get:
      tags: [admin]
      summary: Получить курс по ID
      operationId: adminGetCourseById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Курс найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [admin]
      summary: Обновить курс (админ)
      operationId: adminUpdateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseRequest'
      responses:
        '200':
          description: Курс обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/admin/courses/{course_id}/publish:
    post:
      tags: [admin]
      summary: Опубликовать курс (админ)
      operationId: adminPublishCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Опубликовано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/teacher/courses:
    post:
      tags: [teacher]
      summary: Создать курс (преподаватель)
      operationId: teacherCreateCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/teacher/courses/{course_id}/modules:
    post:
      tags: [teacher]
      summary: Добавить модуль в курс
      operationId: teacherAddModule
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddModuleRequest'
      responses:
        '201':
          description: Модуль создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/teacher/courses/{course_id}/modules/{module_id}/lessons:
    post:
      tags: [teacher]
      summary: Добавить урок в модуль
      operationId: teacherAddLesson
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLessonRequest'
      responses:
        '201':
          description: Урок создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/teacher/courses/{course_id}/publish:
    post:
      tags: [teacher]
      summary: Опубликовать свой курс
      operationId: teacherPublishCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Опубликовано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/public/courses/{slug}:
    get:
      tags: [public]
      summary: Получить опубликованный курс по SEO slug
      operationId: publicGetCourseBySlug
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: Данные опубликованной страницы курса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicCourseResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/student/courses/{course_id}/enrollments:
    post:
      tags: [student]
      summary: Зачислить ученика на курс (нужен approved доступ)
      operationId: studentEnrollCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '201':
          description: Зачислен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/admin/access-grants:
    get:
      tags: [admin]
      summary: Список запросов доступа (с фильтрами)
      operationId: adminListAccessGrants
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AccessGrantStatus'
        - in: query
          name: student_id
          schema:
            type: string
            format: uuid
        - in: query
          name: course_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Запросы доступа
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }

  /v1/admin/access-grants/{grant_id}/approve:
    post:
      tags: [admin]
      summary: Одобрить доступ (разрешено из paid)
      operationId: adminApproveAccessGrant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GrantId'
      responses:
        '200':
          description: Доступ одобрен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/admin/access-grants/{grant_id}/reject:
    post:
      tags: [admin]
      summary: Отклонить доступ
      operationId: adminRejectAccessGrant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GrantId'
      responses:
        '200':
          description: Доступ отклонен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/admin/access-grants/{grant_id}/mark-paid:
    post:
      tags: [admin]
      summary: Отметить доступ как paid (ручное подтверждение)
      operationId: adminMarkAccessGrantPaid
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GrantId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkAccessGrantPaidRequest'
      responses:
        '200':
          description: Доступ отмечен как paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v1/student/enrollments/{enrollment_id}/progress:
    patch:
      tags: [student]
      summary: Обновить прогресс по уроку
      operationId: studentUpdateProgress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnrollmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Прогресс обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/student/submissions:
    post:
      tags: [student]
      summary: Отправить попытку задания или квиза
      operationId: studentSubmitWork
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '201':
          description: Отправлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/teacher/submissions/{submission_id}/grade:
    post:
      tags: [teacher]
      summary: Оценить сабмит
      operationId: teacherGradeSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeSubmissionRequest'
      responses:
        '200':
          description: Оценено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /v1/parent/students/{student_id}/courses/{course_id}/progress:
    get:
      tags: [parent]
      summary: Читать прогресс связанного ученика по курсу
      operationId: parentGetStudentProgress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StudentId'
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Детали прогресса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/parent/students/{student_id}/courses/progress:
    get:
      tags: [parent]
      summary: Читать прогресс связанного ученика по активным курсам
      operationId: parentListStudentCourseProgress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Список прогресса ученика по курсам
          content:
            application/json:
              schema:
                type: object
                required: [items, limit, offset]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseProgressItem'
                  limit:
                    type: integer
                    minimum: 1
                  offset:
                    type: integer
                    minimum: 0
                  status:
                    type: string
                    nullable: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/parent/students/{student_id}/courses/completed:
    get:
      tags: [parent]
      summary: Читать завершенные курсы связанного ученика
      operationId: parentListStudentCompletedCourses
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Завершенные курсы
          content:
            application/json:
              schema:
                type: object
                required: [items, limit, offset]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompletedCourseItem'
                  limit:
                    type: integer
                    minimum: 1
                  offset:
                    type: integer
                    minimum: 0
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/parent/students/{student_id}/access-grants:
    get:
      tags: [parent]
      summary: Читать статусы доступов связанного ученика
      operationId: parentListStudentAccessGrants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Статусы доступов ученика
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/parent/students/{student_id}/courses/{course_id}/access-requests:
    post:
      tags: [parent]
      summary: Создать запрос доступа к курсу ребенка
      operationId: parentCreateAccessRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StudentId'
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessRequest'
      responses:
        '201':
          description: Запрос доступа создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrantResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceToken:
      type: apiKey
      in: header
      name: X-Service-Token

  parameters:
    CourseId:
      name: course_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ModuleId:
      name: module_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    EnrollmentId:
      name: enrollment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    SubmissionId:
      name: submission_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    GrantId:
      name: grant_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    StudentId:
      name: student_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    AccessDenied:
      description: Доступ запрещен
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Не найдено
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Конфликт или нарушение инварианта
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationError:
      description: Ошибка валидации
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Problem:
      type: object
      required: [type, title, status, detail]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        request_id: { type: string }

    PublishState:
      type: string
      enum: [draft, published, archived]

    AccessGrantStatus:
      type: string
      enum: [requested, paid, approved, rejected, revoked]

    AccessDecision:
      type: string
      enum: [allow, deny]

    AccessDecisionReasonCode:
      type: string
      enum:
        - admin_override
        - teacher_owner
        - parent_allowed
        - student_allowed
        - course_not_found
        - access_grant_required
        - access_grant_not_approved
        - enrollment_required
        - enrollment_not_active
        - role_not_allowed

    CourseAccessCheckRequest:
      type: object
      required: [course_id, actor_account_id, actor_roles]
      properties:
        course_id:
          type: string
          format: uuid
        actor_account_id:
          type: string
          format: uuid
        actor_roles:
          type: array
          items:
            type: string
            enum: [admin, teacher, parent, student]
        student_id:
          type: string
          format: uuid
          nullable: true
        require_active_grant:
          type: boolean
          default: true
        require_enrollment:
          type: boolean
          default: false

    CourseAccessDecisionResponse:
      type: object
      required:
        [decision, reason_code, course_id, actor_account_id, checked_at]
      properties:
        decision:
          $ref: '#/components/schemas/AccessDecision'
        reason_code:
          $ref: '#/components/schemas/AccessDecisionReasonCode'
        course_id:
          type: string
          format: uuid
        actor_account_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
          nullable: true
        grant_status:
          $ref: '#/components/schemas/AccessGrantStatus'
          nullable: true
        enrollment_status:
          type: string
          enum: [active, completed, canceled]
          nullable: true
        checked_at:
          type: string
          format: date-time

    LessonContentItem:
      type: object
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [text, video, file, link]
        value:
          type: string
        title:
          type: string

    LearningObjective:
      type: object
      required: [text]
      properties:
        text:
          type: string

    ScheduleWindow:
      type: object
      properties:
        opens_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        enrollment_opens_at:
          type: string
          format: date-time
        enrollment_closes_at:
          type: string
          format: date-time
        starts_at:
          type: string
          format: date-time
        duration_days:
          type: integer
          minimum: 1
        access_ttl_days:
          type: integer
          minimum: 1
        timezone:
          type: string

    SeoMetadata:
      type: object
      properties:
        meta_title:
          type: string
          maxLength: 70
        meta_description:
          type: string
          maxLength: 160
